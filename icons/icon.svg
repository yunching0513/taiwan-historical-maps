<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="台灣地圖">
  <!-- Paper -->
  <rect width="512" height="512" fill="#F1EFE9"/>

  <!-- Hairline outer border (design system motif) -->
  <rect x="14" y="14" width="484" height="484" fill="none" stroke="#BBB8AE" stroke-width="2"/>

  <!-- Centered text — 台灣地圖, Songti / Noto Serif TC, soft graphite, breathing room -->
  <text x="256" y="256"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Songti TC, Noto Serif TC, 'Source Han Serif TC', serif"
        font-weight="400"
        font-size="80"
        fill="#565347"
        letter-spacing="6">台灣地圖</text>
</svg>
