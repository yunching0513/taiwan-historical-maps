<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>關東古地圖散策 · Kanto Old-Map Stroll</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin: 0; height: 100%; font-family: "Noto Sans TC", system-ui, sans-serif; }
  #map { position: absolute; inset: 0; }
  .panel {
    position: absolute; bottom: 12px; left: 12px; top: auto; z-index: 1000;
    background: rgba(26,24,21,0.86); color: #F1EFE9;
    padding: 14px 16px; border-radius: 12px; width: 268px;
    max-width: calc(100vw - 24px); max-height: calc(100vh - 24px); overflow-y: auto;
    box-shadow: 0 12px 40px -12px rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  }
  /* 手機：底部整條收合式面板（仿台灣 App 的 bottom sheet） */
  @media (max-width: 600px) {
    .panel { left: 0; right: 0; bottom: 0; width: auto; max-width: none;
             border-radius: 14px 14px 0 0; max-height: 72vh; }
  }
  .panel h1 { font-size: 15px; margin: 0 38px 2px 0; letter-spacing: .04em; }
  /* 收合鈕 */
  .panel-toggle {
    position: absolute; top: 10px; right: 10px;
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,.22); background: transparent;
    color: #F1EFE9; font-size: 13px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s; -webkit-tap-highlight-color: transparent;
  }
  .panel-toggle:hover { background: rgba(255,255,255,.08); }
  .panel.collapsed { width: auto; padding-bottom: 12px; }
  .panel.collapsed h1 { margin-bottom: 0; }
  .panel.collapsed .panel-body { display: none; }
  .panel .sub { font-size: 11px; color: #b9b3a6; margin: 0 0 12px; }
  .layer { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,.12); }
  .layer:last-of-type { border-bottom: none; }
  .layer label { display: flex; align-items: center; gap: 9px; font-size: 13px; cursor: pointer; padding: 9px 10px; border: 1px solid transparent; border-radius: 9px; transition: background .15s, border-color .15s; -webkit-tap-highlight-color: transparent; }
  /* 隱藏預設藍色 radio：改用整列點選 + 自訂朱色圓點，手機好按 */
  .layer input[type=radio] { display: none; }
  .layer label::before { content: ''; width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid #8f897d; flex-shrink: 0; transition: background .15s, border-color .15s; }
  .layer label:active { background: rgba(255,255,255,.06); }
  .layer.sel label { border-color: #C15F3C; background: rgba(193,95,60,.16); }
  .layer.sel label::before { background: #C15F3C; border-color: #C15F3C; box-shadow: 0 0 0 3px rgba(193,95,60,.22); }
  .layer .yr { margin-left: auto; font-family: monospace; font-size: 10px; color: #8f897d; }
  .layer.sel .yr { color: #C15F3C; }
  .layer .lic { font-size: 10px; color: #8f897d; margin: 3px 0 0 12px; }
  .layer input[type=range] { width: 100%; margin: 10px 0 0; height: 24px; accent-color: #C15F3C; }
  .hint { font-size: 10.5px; color: #b9b3a6; line-height: 1.5; margin-top: 4px; }
  .back { display:inline-block; margin-top:10px; font-size:11px; color:#C15F3C; text-decoration:none; }
  .back:hover { text-decoration:underline; }
  .places { display:flex; gap:6px; margin:0 0 10px; }
  .place-btn { flex:1; padding:6px 4px; border:1px solid rgba(255,255,255,.18); background:transparent; color:#F1EFE9; font-size:12px; border-radius:8px; cursor:pointer; }
  .place-btn:hover { border-color:#C15F3C; color:#C15F3C; }
</style>
</head>
<body>
<div id="map"></div>
<div class="panel" id="panel">
  <button type="button" class="panel-toggle" id="panel-toggle" aria-label="收合功能列" aria-expanded="true">▾</button>
  <h1>關東古地圖散策</h1>
  <div class="panel-body" id="panel-body">
  <p class="sub">日本政府／公立機構公開授權圖資（無 NC 限制）· 關東</p>

  <div class="places">
    <button type="button" class="place-btn" data-lat="35.6812" data-lng="139.7671" data-z="15">東京</button>
    <button type="button" class="place-btn" data-lat="35.4498" data-lng="139.6425" data-z="14">橫濱</button>
  </div>

  <div class="layer">
    <label><input type="radio" name="hist" value="rapid" checked /> 迅速測図（實測地圖）<span class="yr">1880s</span></label>
    <div class="lic">農研機構 歷史的農業環境閲覧システム · CC BY 2.1 JP</div>
    <input type="range" min="0" max="1" step="0.01" value="0.75" data-for="rapid" />
  </div>
  <div class="layer">
    <label><input type="radio" name="hist" value="riku" /> 舊軍空中写真<span class="yr">1936–42</span></label>
    <div class="lic">国土地理院 地理院タイル · 出典明示で商用可</div>
    <input type="range" min="0" max="1" step="0.01" value="0.85" data-for="riku" />
  </div>
  <div class="layer">
    <label><input type="radio" name="hist" value="usa" /> 米軍空中写真<span class="yr">1945–50</span></label>
    <div class="lic">国土地理院 地理院タイル · 出典明示で商用可</div>
    <input type="range" min="0" max="1" step="0.01" value="0.85" data-for="usa" />
  </div>
  <p class="hint">底圖：CARTO / OpenStreetMap。拉透明度即可今昔對照。</p>
  <a class="back" href="../index.html">← 台灣舊地圖散策</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', { zoomControl: true }).setView([35.6812, 139.7671], 15); // 東京駅

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 20, attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);

  // 迅速測図（NARO）は TMS スキーム（y 反転）。GSI 空中写真は XYZ。
  const defs = {
    rapid: L.tileLayer('https://habs.rad.naro.go.jp/rapid16/{z}/{x}/{y}.png', {
      tms: true, maxNativeZoom: 16, maxZoom: 20, opacity: 0.75,
      attribution: '迅速測図 &copy; 農研機構農業環境研究部門 (CC BY 2.1 JP)'
    }),
    riku: L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort_riku10/{z}/{x}/{y}.png', {
      maxNativeZoom: 17, maxZoom: 20, opacity: 0.85,
      attribution: '空中写真1936-42 &copy; 国土地理院'
    }),
    usa: L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png', {
      maxNativeZoom: 17, maxZoom: 20, opacity: 0.85,
      attribution: '空中写真1945-50 &copy; 国土地理院'
    }),
  };

  let current = 'rapid';
  defs[current].addTo(map);

  function markSelected(val) {
    document.querySelectorAll('input[name=hist]').forEach(r => {
      r.closest('.layer').classList.toggle('sel', r.value === val);
    });
  }
  markSelected(current);

  document.querySelectorAll('input[name=hist]').forEach(r => {
    r.addEventListener('change', e => {
      if (defs[current]) map.removeLayer(defs[current]);
      current = e.target.value;
      defs[current].addTo(map);
      markSelected(current);
    });
  });
  document.querySelectorAll('input[type=range]').forEach(s => {
    s.addEventListener('input', e => {
      const id = e.target.dataset.for;
      defs[id].setOpacity(parseFloat(e.target.value));
    });
  });
  document.querySelectorAll('.place-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      map.flyTo([parseFloat(btn.dataset.lat), parseFloat(btn.dataset.lng)], parseInt(btn.dataset.z, 10));
    });
  });

  // 功能列收合（記住狀態）。手機預設收合，桌機預設展開。
  const panel = document.getElementById('panel');
  const panelToggle = document.getElementById('panel-toggle');
  const COLLAPSE_KEY = 'kantoPanelCollapsed';
  function setCollapsed(on) {
    panel.classList.toggle('collapsed', on);
    panelToggle.textContent = on ? '▴' : '▾';
    panelToggle.setAttribute('aria-expanded', String(!on));
    panelToggle.setAttribute('aria-label', on ? '展開功能列' : '收合功能列');
    try { localStorage.setItem(COLLAPSE_KEY, on ? '1' : '0'); } catch {}
  }
  let startCollapsed;
  try { startCollapsed = localStorage.getItem(COLLAPSE_KEY); } catch {}
  if (startCollapsed === null || startCollapsed === undefined)
    startCollapsed = window.matchMedia('(max-width: 600px)').matches ? '1' : '0';
  setCollapsed(startCollapsed === '1');
  panelToggle.addEventListener('click', () => setCollapsed(!panel.classList.contains('collapsed')));
</script>
</body>
</html>
